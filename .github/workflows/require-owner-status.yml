name: require-owner-status

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master, production ]

jobs:
  check-actor:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is repository owner
        run: |
          ALLOWED1="Hredo"
          ALLOWED2="Hrvr1"
          if [ "${GITHUB_ACTOR}" != "$ALLOWED1" ] && [ "${GITHUB_ACTOR}" != "$ALLOWED2" ]; then
            echo "Unauthorized actor: ${GITHUB_ACTOR}. Only $ALLOWED1 or $ALLOWED2 may push directly to protected branches." >&2
            exit 1
          fi